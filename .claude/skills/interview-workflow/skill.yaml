---
name: interview-workflow
description: |
  Lincoln 标准工作流：将产品经理的访谈录音转化为结构化需求、产品设计、Pencil 原型、TDD 研发计划、OpenSpec 变更提案、
  GitHub Issues，并在代码合并后沉淀到项目 Obsidian 知识库。
version: 1.0.0
author: Lincoln Template
model: claude-sonnet-4-6
tools:
  - Read
  - Grep
  - Glob
  - Bash
  - Edit
  - Write
commands:
  process-interview:
    description: 处理访谈录音，生成转写、摘要和初始洞察
    prompt: prompts/process-interview.md
    arguments:
      - name: recording_path
        description: 录音文件路径，如 recordings/2026-06-27-stakeholder.m4a
        required: true

  clarify-requirements:
    description: 基于访谈内容与人类 PM 多轮澄清需求
    prompt: prompts/clarify-requirements.md
    arguments:
      - name: session_id
        description: 访谈会话 ID，如 2026-06-27-stakeholder
        required: true

  propose-with-openspec:
    description: 基于已确认 TDD 研发计划调用 OpenSpec CLI 生成变更提案 artifact
    prompt: prompts/propose-with-openspec.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: design_id
        description: 产品设计 ID，如 checkout-redesign
        required: true
      - name: change_name
        description: OpenSpec 变更名称，如 add-csv-export
        required: true

  draft-product-design:
    description: 基于已确认需求生成产品设计评审文档包
    prompt: prompts/draft-product-design.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: design_id
        description: 产品设计 ID，如 checkout-redesign
        required: true

  build-product-prototype:
    description: 基于已确认设计文档生成字段、界面规格和 Pencil 原型
    prompt: prompts/build-product-prototype.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: design_id
        description: 产品设计 ID
        required: true

  plan-tdd-development:
    description: 基于已确认产品设计和 Pencil 原型生成 TDD 研发计划
    prompt: prompts/plan-tdd-development.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: design_id
        description: 产品设计 ID
        required: true

  split-to-github:
    description: 将 OpenSpec tasks 拆分为 GitHub Issues
    prompt: prompts/split-to-github.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: change_name
        description: OpenSpec 变更名称
        required: true

  sync-to-knowledge:
    description: PR 合并后将代码和 issue 沉淀到 Obsidian 知识库
    prompt: prompts/sync-to-knowledge.md
    arguments:
      - name: issue_number
        description: GitHub Issue 编号
        required: true
      - name: pr_number
        description: GitHub PR 编号
        required: true

  workflow-continue:
    description: 人类修改文件后继续被暂停的工作流
    prompt: prompts/workflow-continue.md

validators:
  runner: validators/validate.py
  usage: "python {runner} --phase {entry|exit} --check {check-name} --args {comma-separated-args}"

references:
  agents_guide: .claude/AGENTS.md
  workflow_yaml: .claude/workflows/interview-to-knowledge.yaml
  openspec: https://github.com/Fission-AI/openspec

skill_ecosystem:
  superpowers:
    - superpowers:brainstorming
    - superpowers:writing-plans
    - superpowers:test-driven-development
    - superpowers:subagent-driven-development
    - superpowers:verification-before-completion
    - superpowers:dispatching-parallel-agents
    - superpowers:using-git-worktrees
    - superpowers:systematic-debugging
    - superpowers:finishing-a-development-branch
    - superpowers:requesting-code-review
    - superpowers:receiving-code-review
  gsd:
    - gsd-import
    - gsd-docs-update
    - gsd-forensics
    - gsd-ns-review
  engine: everything-claude-code
  openspec_cli: openspec

skill_invocation_rules:
  - In `human_gate: true` stages, sub-skills are for exploration/structuring only.
  - Implementation sub-skills require explicit PM approval.
  - GSD skills are invoked via the `Skill` tool, not Codex `$` syntax.
