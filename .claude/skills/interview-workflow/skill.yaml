---
name: interview-workflow
description: |
  Lincoln 标准工作流：将产品经理的访谈录音转化为结构化需求、OpenSpec 变更提案、
  GitHub Issues，并在代码合并后沉淀到项目 Obsidian 知识库。
version: 1.0.0
author: Lincoln Template
model: claude-sonnet-4-6
tools:
  - Read
  - Grep
  - Glob
  - Bash
  - Edit
  - Write
commands:
  process-interview:
    description: 处理访谈录音，生成转写、摘要和初始洞察
    prompt: prompts/process-interview.md
    arguments:
      - name: recording_path
        description: 录音文件路径，如 recordings/2026-06-27-stakeholder.m4a
        required: true

  clarify-requirements:
    description: 基于访谈内容与人类 PM 多轮澄清需求
    prompt: prompts/clarify-requirements.md
    arguments:
      - name: session_id
        description: 访谈会话 ID，如 2026-06-27-stakeholder
        required: true

  propose-with-openspec:
    description: 调用 OpenSpec CLI 生成变更提案 artifact
    prompt: prompts/propose-with-openspec.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: change_name
        description: OpenSpec 变更名称，如 add-csv-export
        required: true

  split-to-github:
    description: 将 OpenSpec tasks 拆分为 GitHub Issues
    prompt: prompts/split-to-github.md
    arguments:
      - name: session_id
        description: 访谈会话 ID
        required: true
      - name: change_name
        description: OpenSpec 变更名称
        required: true

  sync-to-knowledge:
    description: PR 合并后将代码和 issue 沉淀到 Obsidian 知识库
    prompt: prompts/sync-to-knowledge.md
    arguments:
      - name: issue_number
        description: GitHub Issue 编号
        required: true
      - name: pr_number
        description: GitHub PR 编号
        required: true

  workflow-continue:
    description: 人类修改文件后继续被暂停的工作流
    prompt: prompts/workflow-continue.md

validators:
  runner: validators/validate.py
  usage: "python {runner} --phase {entry|exit} --check {check-name} --args {comma-separated-args}"

references:
  agents_guide: .claude/AGENTS.md
  workflow_yaml: .claude/workflows/interview-to-knowledge.yaml
  openspec: https://github.com/Fission-AI/openspec
